services:
  database:
    image: mysql:8.4
    container_name: kanggo-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kanggo}
      MYSQL_USER: ${MYSQL_USER:-kanggo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kanggo_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: kanggo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-kanggo_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-kanggo_password}
      DB_NAME: ${MYSQL_DATABASE:-kanggo}
      DB_CONNECTION_LIMIT: 10
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: kanggo-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
